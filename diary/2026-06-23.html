<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026年6月23日 - 大理日记</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }
        .container { max-width: 700px; margin: 0 auto; }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        .diary-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .diary-header {
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid #eee;
        }
        .diary-date { color: #667eea; font-weight: 600; font-size: 1.2rem; }
        .diary-location { color: #888; font-size: 0.9rem; margin-top: 4px; }
        
        h2 {
            font-size: 1.1rem;
            color: #667eea;
            margin: 20px 0 12px 0;
        }
        .weather {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            background: #f8f9fa;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
        }
        .weather span { color: #666; }

        .section-content { margin-top: 8px; }
        .section-content p { margin-bottom: 8px; }

        .food-list {
            list-style: none;
        }
        .food-list li {
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .food-list li:last-child { border-bottom: none; }
        
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
            margin-top: 12px;
        }
        .photo-grid img {
            width: 100%;
            border-radius: 8px;
            display: block;
        }
        .photo-caption {
            font-size: 0.85rem;
            color: #666;
            margin-top: 4px;
            text-align: center;
        }

        .tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 16px;
        }
        .tag {
            background: #f0f0f0;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: #666;
        }
        
        .highlight {
            background: #fef9e7;
            padding: 12px 16px;
            border-radius: 8px;
            margin: 12px 0;
        }
        .highlight strong { color: #e17055; }
    </style>
</head>
<body>
    <div class="container">
        <a href="../index.html" class="back-link">← 返回日记列表</a>
        
        <div class="diary-card">
            <div class="diary-header">
                <div class="diary-date">2026年6月23日</div>
                <div class="diary-location">📍 大理市, 云南省</div>
            </div>
            
            <h2>🌤️ 天气</h2>
            <div class="weather">
                <span>☀️ 晴</span>
                <span>🌡️ 适中</span>
            </div>
            
            <h2>✍️ 今日感悟</h2>
            <div class="section-content">
                <div class="highlight">
                    <strong>带 Simon 的侄女逛大理</strong>：带着 Simon 的侄女逛了大理古城还有洱海边的才村，天气不错拍了很多照片 📸
                </div>
                <div class="highlight">
                    <strong>美食</strong>：吃了曼傣，傣族特色菜味道也不错 🍜
                </div>
                <div class="highlight">
                    <strong>脚伤好转</strong>：脚也没有太多事情，快好了 💪
                </div>
                <div class="highlight">
                    <strong>购物</strong>：黑曜石也买了，开心！ 🔮
                </div>
            </div>
            
            <h2>🍽️ 今日美食分享</h2>
            <ul class="food-list">
                <li><strong>曼傣</strong> - 傣族特色菜，味道不错</li>
            </ul>
            
            <h2>📷 今日照片</h2>
            <div class="photo-grid">
                <img src="diary/images/2026-06-23-01.jpg" alt="今日照片">
            </div>
            
            <div class="tags">
                <span class="tag">#旅游</span>
                <span class="tag">#美食</span>
                <span class="tag">#购物</span>
                <span class="tag">#康复</span>
            </div>
        </div>
    </div>
</body>
</html>
